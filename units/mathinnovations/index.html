      { n: 2, text: '<strong>Who Invented the Hindu-Arabic Number System?</strong><br>The decimal place value system revolutionized basic calculations, record keeping, financial accounting, and everything else that involves working with large numbers—yet we are at a loss to name its inventor. The decimal system that we use today is generally called the Hindu-Arabic number system, but this hyphenated name tells only part of the story.' },
      { n: 3, text: 'By the ninth century, Muslim authors were writing about the Indian decimal place value system that they had learned about from Hindu texts and were eager to share what they had learned with others. These authors helped spread the Hindu numbering system to the Arab world and eventually to Europe, where it gradually replaced the Roman numeral system.' },
